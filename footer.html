<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Newsletter Imagino</title>
  <link rel="stylesheet" href="footer.css" />
</head>
<body>

  <footer class="footer">
    <div class="container">
      <h2 class="title">NEWSLETTER</h2>
      <p class="subtitle">Good news only</p>

      <form class="form-inline" action="#" method="post">
        <input
          type="email"
          name="email"
          placeholder="Saisissez votre adresse e-mail"
          required
        />
        <button type="submit">
          <span class="icon">📧</span> S’abonner
        </button>
      </form>

      <p class="legal">
        En vous inscrivant, vous acceptez de vous conformer à la
        <a href="#">Politique de confidentialité</a>
        et aux
        <a href="#">Conditions d'utilisation</a> d’imagino.
      </p>
    </div>
  </footer>

</body>
</html>
